<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <cachedir>/tmp/.cache/fontconfig</cachedir>

    <!--
        Only scan directories containing approved fonts (Source Sans 3 and Noto).
        This prevents Typst's font fallback from picking up any other
        system fonts (DejaVu, URW, Droid, etc.) that may have different licenses.
    -->
    <dir>/usr/share/fonts/truetype/sourcesans3</dir>
    <dir>/usr/share/fonts/truetype/noto</dir>
</fontconfig>