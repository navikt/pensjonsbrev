apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: {{app-name}}
  namespace: "pensjonsbrev"
  labels:
    "team": "pensjonsbrev"
spec:
  image: {{image}}
  port: 8080
  terminationGracePeriodSeconds: 60
  service:
    port: 80
    protocol: http
  liveness:
    path: "/isAlive"
    port: 8080
    initialDelay: 20
    timeout: 60
  readiness:
    path: "/isReady"
    port: 8080
    initialDelay: 20
    timeout: 5
    # Tåle en kortvarig CPU-spike (typst-prosesser som spiser tid) uten å bli kicket
    # ut av ingress-rotasjon. failureThreshold * periodSeconds = ~100s før poden
    periodSeconds: 10
    failureThreshold: 10
  replicas:
    min: {{minReplicas}}
    max: 150
    cpuThresholdPercentage: 50
  prometheus:
    enabled: true
    path: "/metrics"
    port: "8080"
  observability:
    autoInstrumentation:
      enabled: true
      runtime: java
    logging:
      destinations:
        - id: elastic
        - id: loki
  resources:
    requests:
      cpu: "400m"
      memory: "1Gi"
    limits:
      memory: "2Gi"
  accessPolicy:
    inbound:
      rules:
        - application: {{brevbaker-app}}
  ingresses: [{{#each ingresses as |url|}}{{url}},{{/each}}]
