name: .build-frontend.yaml

on:
  workflow_call:
    inputs:
      workingDir:
        description: "Working directory"
        required: true
        type: string
      deployToProd:
        description: "Deploy to prod?"
        required: true
        type: boolean

jobs:
  build:
    name: build
    permissions:
      contents: read
      packages: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".tool-versions"
          registry-url: https://npm.pkg.github.com/
          scope: "@navikt"
          cache: "npm"
          cache-dependency-path: ${{ inputs.workingDir }}/bff/package-lock.json

      - name: Install frontend
        working-directory: ${{ inputs.workingDir }}/frontend
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      - name: Build frontend
        working-directory: ${{ inputs.workingDir }}/frontend
        run: npm run build

      - name: Copy frontend dist into public directory of bff
        working-directory: ${{ inputs.workingDir }}/frontend
        run: cp -r dist/ ../bff/public

      - name: Install bff dependencies
        working-directory: ${{ inputs.workingDir }}/bff
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      - name: Build bff
        working-directory: ${{ inputs.workingDir }}/bff
        run: npm run build

      - name: Build and push Docker container
        uses: nais/docker-build-push@751a312f0803eb96a05a41fadf51be19b7be362c # v0
        id: docker-build-push
        with:
          team: pensjonsbrev
          image_suffix: ${{ inputs.workingDir }}
          docker_context: ${{ inputs.workingDir }}/bff
          dockerfile: ${{ inputs.workingDir }}/bff/Dockerfile
          salsa: false
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}

  salsa:
    uses: ./.github/workflows/.salsa.yaml
    needs: build
    secrets: inherit
    with:
      image: ${{ needs.build.outputs.image }}

  deploy-dev:
    name: Deploy app to dev
    uses: ./.github/workflows/.deploy.yaml
    secrets: inherit
    needs: build
    with:
      image: ${{needs.build.outputs.image}}
      cluster: "dev-gcp"
      resource: "${{ inputs.workingDir }}/bff/.nais/nais.yaml"
      vars: "${{ inputs.workingDir }}/bff/.nais/bff-dev.yaml"

  deploy-prod:
    name: Deploy app to prod
    uses: ./.github/workflows/.deploy.yaml
    secrets: inherit
    if: ${{ inputs.deployToProd }}
    needs: build
    with:
      cluster: prod-gcp
      resource: ${{ inputs.workingDir }}/bff/.nais/nais.yaml
      image: ${{needs.build.outputs.image}}
      vars: "${{ inputs.workingDir }}/bff/.nais/bff-prod.yaml"
