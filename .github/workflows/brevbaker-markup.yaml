name: "Build and release brevbaker-markup"
on:
  workflow_dispatch:
  pull_request:
    branches:
      - "main"
    paths:
      - "brevbaker/markup/**"
      - ".github/workflows/.build-backend.yaml"
      - ".github/workflows/.release.yaml"
      - ".github/workflows/brevbaker-markup.yaml"
      - "gradle/wrapper/gradle-wrapper.jar"
      - "gradle/wrapper/gradle-wrapper.properties"
  push:
    branches:
      - "main"
    paths:
      - "brevbaker/markup/**"
      - ".github/workflows/.build-backend.yaml"
      - ".github/workflows/.release.yaml"
      - ".github/workflows/brevbaker-markup.yaml"
      - "gradle/wrapper/gradle-wrapper.jar"
      - "gradle/wrapper/gradle-wrapper.properties"

permissions:
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      markup: ${{ steps.changes.outputs.markup }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: changes
        with:
          filters: |
            markup:
              - 'brevbaker/markup/**'

  release-markup:
    name: "brevbaker-markup"
    uses: ./.github/workflows/.release.yaml
    secrets: inherit
    needs: [ changes ]
    with:
      gradleTarget: 'brevbaker:markup'
      release-common-result: 'success'
      changes: ${{ needs.changes.outputs.markup }}
      dependsOnCommon: false

  klarTilMerge:
    name: "Klar til merge"
    needs: [ release-markup ]
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/pr
