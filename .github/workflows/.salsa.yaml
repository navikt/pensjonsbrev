name: .salsa.yaml

on:
  workflow_call:
    inputs:
      image:
        description: 'Image to analyze'
        required: true
        type: string
      digest:
        description: 'Digest of image to analyze'
        required: true
        type: string

jobs:
  salsa:
    name: Generate SBOM, attest and sign image
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: "write"
    steps:
      - name: NAIS login
        uses: nais/login@d0fcfa8591d10b57312f58e7f6269de58bdab1df # v0
        id: login
        with:
          team: pensjonsbrev
      - name: Generate SBOM, attest and sign image
        id: attest-sign
        uses: nais/attest-sign@2548fccb3e472f3f65d1cf0fe6e339c7675d3c55 # v2.0.9
        with:
          image_ref: ${{ inputs.image }}@${{ inputs.digest }}
