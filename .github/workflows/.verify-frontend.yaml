name: .verify-frontend.yaml

on:
  workflow_call:
    inputs:
      workingDir:
        description: "Working directory"
        required: true
        type: string
      runTests:
        description: "Run tests"
        required: true
        type: boolean

jobs:
  verify-bff:
    name: Verify bff tests, lint and typescript errors
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".tool-versions"
          registry-url: https://npm.pkg.github.com/
          scope: "@navikt"
          cache: "npm"
          cache-dependency-path: ${{ inputs.workingDir }}/bff/package-lock.json

      - name: Install bff dependencies
        working-directory: ${{ inputs.workingDir }}/bff
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      - name: Run Biome lint
        working-directory: ${{ inputs.workingDir }}/bff
        run: npm run lint

      - name: Check for typescript errors
        working-directory: ${{ inputs.workingDir }}/bff
        run: npm run check-types

      - name: Build bff
        working-directory: ${{ inputs.workingDir }}/bff
        run: npm run build

  verify-frontend:
    name: Verify frontend tests, lint and typescript errors
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".tool-versions"
          registry-url: https://npm.pkg.github.com/
          scope: "@navikt"
          cache: "npm"
          cache-dependency-path: ${{ inputs.workingDir }}/frontend/package-lock.json

      - name: Install dependencies
        working-directory: ${{ inputs.workingDir }}/frontend
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      - name: Lint code and config
        working-directory: ${{ inputs.workingDir }}/frontend
        run: npm run lint

      - name: Lint css
        working-directory: ${{ inputs.workingDir }}/frontend
        run: npm run stylelint

      - name: Check types
        working-directory: ${{ inputs.workingDir }}/frontend
        run: npm run check-types

      - name: Run unit tests
        if: ${{ inputs.runTests }}
        working-directory: ${{ inputs.workingDir }}/frontend
        run: npm run test

      - name: Cache test runner browser
        if: ${{ inputs.runTests }}
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles(format('{0}/frontend/package-lock.json', inputs.workingDir)) }}

      - name: Install e2e test runner and browser
        if: ${{ inputs.runTests && steps.playwright-cache.outputs.cache-hit != 'true' }}
        working-directory: ${{ inputs.workingDir }}/frontend
        run: npx playwright install --with-deps chromium

      - name: Install system deps for cached test runner browser
        if: ${{ inputs.runTests && steps.playwright-cache.outputs.cache-hit == 'true' }}
        working-directory: ${{ inputs.workingDir }}/frontend
        run: npx playwright install-deps chromium

      - name: Run e2e tests
        if: ${{ inputs.runTests }}
        working-directory: ${{ inputs.workingDir }}/frontend
        run: npx playwright test

      - name: Upload e2e artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ inputs.runTests && failure() }}
        with:
          name: playwright-artifacts
          path: ${{ inputs.workingDir }}/frontend/test/e2e-report/
