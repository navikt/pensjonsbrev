name: .verify-frontend.yaml

on:
  workflow_call:
    inputs:
      workingDir:
        description: "Working directory"
        required: true
        type: string
      cypress:
        description: "Run cypress tests"
        required: true
        type: boolean

jobs:
  verify-bff:
    name: Verify bff tests, lint and typescript errors
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".tool-versions"
          registry-url: https://npm.pkg.github.com/
          scope: "@navikt"
          cache: "npm"
          cache-dependency-path: ${{ inputs.workingDir }}/bff/package-lock.json

      - name: Install bff dependencies
        working-directory: ${{ inputs.workingDir }}/bff
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      - name: Run Biome lint
        working-directory: ${{ inputs.workingDir }}/bff
        run: npm run lint

      - name: Check for typescript errors
        working-directory: ${{ inputs.workingDir }}/bff
        run: npm run check-types

      - name: Build bff
        working-directory: ${{ inputs.workingDir }}/bff
        run: npm run build

  verify-frontend:
    name: Verify frontend tests, lint and typescript errors
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".tool-versions"
          registry-url: https://npm.pkg.github.com/
          scope: "@navikt"
          cache: "npm"
          cache-dependency-path: ${{ inputs.workingDir }}/frontend/package-lock.json

      - name: Cache Cypress binary
        if: ${{ inputs.cypress }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ hashFiles(format('{0}/frontend/package-lock.json', inputs.workingDir)) }}

      - name: Install dependencies
        working-directory: ${{ inputs.workingDir }}/frontend
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      - name: Install Cypress binary
        if: ${{ inputs.cypress }}
        working-directory: ${{ inputs.workingDir }}/frontend
        run: npx cypress install

      - name: Run Biome lint
        working-directory: ${{ inputs.workingDir }}/frontend
        run: npm run lint

      - name: Run stylelint
        working-directory: ${{ inputs.workingDir }}/frontend
        run: npm run stylelint

      - name: Check for typescript errors
        working-directory: ${{ inputs.workingDir }}/frontend
        run: npm run check-types

      - name: Run tests
        if: ${{ inputs.cypress }}
        working-directory: ${{ inputs.workingDir }}/frontend
        run: npm run test

      - name: Cypress run component tests
        if: ${{ inputs.cypress }}
        uses: cypress-io/github-action@783cb3f07983868532cabaedaa1e6c00ff4786a8 # v7.1.9
        with:
          working-directory: ${{ inputs.workingDir }}/frontend
          install: false
          browser: chrome
          component: true

      - name: Cypress run e2e tests
        if: ${{ inputs.cypress }}
        uses: cypress-io/github-action@783cb3f07983868532cabaedaa1e6c00ff4786a8 # v7.1.9
        with:
          working-directory: ${{ inputs.workingDir }}/frontend
          install: false
          browser: chrome
          component: false
          build: npm run build
          start: 'npm run preview -- --port 5173'

      - name: Upload failed Cypress screenshots
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ failure() && inputs.cypress}}
        with:
          name: cypress-screenshots
          path: ${{ inputs.workingDir }}/frontend/cypress/screenshots
