name: .deploy.yaml

on:
  workflow_call:
    inputs:
      image:
        description: 'Image to deploy'
        required: true
        type: string
      resource:
        description: 'Resources to deploy'
        required: true
        type: string
      vars:
        description: 'Variables to deploy'
        required: true
        type: string
      cluster:
        description: 'Cluster to deploy to'
        required: true
        type: string
      redeployProd:
        description: 'Redeploy to prod'
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    name: Deploy app
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    if: ${{
      (inputs.cluster == 'dev-gcp' && (((github.event_name == 'push' || github.event_name == 'schedule') && github.ref == 'refs/heads/main' )  || github.event_name == 'workflow_dispatch')) ||
      (inputs.cluster == 'prod-gcp' && (github.ref == 'refs/heads/main' && (github.event_name == 'push' || inputs.redeployProd))) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Deploy to ${{ inputs.cluster }}
        uses: nais/deploy/actions/deploy@2d18f050f07b6a007864c6a57070ed915d571beb # v2
        env:
          CLUSTER: ${{ inputs.cluster }}
          RESOURCE: ${{ inputs.resource }}
          VAR: image=${{ inputs.image }}
          VARS: ${{ inputs.vars }}